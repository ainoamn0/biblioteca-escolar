<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta — Biblioteca Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --pink: #ec4899;
    --bg: #020917;
    --card: rgba(15, 30, 60, 0.6);
    --border: rgba(255,255,255,0.08);
    --text: #fff;
    --gray: #94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#020917;
    color:var(--text);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* FUNDO */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

.light{
    position:absolute;
    width:500px;
    height:500px;
    filter:blur(120px);
    animation:move 10s infinite alternate;
}

.light:nth-child(1){
    background: radial-gradient(circle, rgba(59,130,246,0.4), transparent);
}

.light:nth-child(2){
    background: radial-gradient(circle, rgba(139,92,246,0.4), transparent);
    left:60%;
    top:40%;
}

.light:nth-child(3){
    background: radial-gradient(circle, rgba(236,72,153,0.3), transparent);
    left:30%;
    top:70%;
}

@keyframes move{
    0%{transform:translate(0,0);}
    100%{transform:translate(80px,-60px);}
}

/* CONTAINER */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

/* LOGO FORA DO CARD */
.logo{
    text-align:center;
}

.logo img{
    height:50px;
}

.logo h1{
    font-size:14px;
    color:var(--gray);
    margin-top:5px;
}

/* CARD */
.card{
    width:500px;
    background:var(--card);
    backdrop-filter: blur(20px);
    border:1px solid var(--border);
    border-radius:30px;
    padding:40px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    position:relative;
}

/* BARRA COLORIDA */
.card::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:5px;
    border-radius:30px 30px 0 0;
    background: linear-gradient(90deg, var(--blue), var(--purple), var(--pink));
}

/* HEADER */
.title{
    font-family:'Montserrat';
    font-size:26px;
    font-weight:800;
    margin-bottom:5px;
    text-align:center;
}

.subtitle{
    font-size:13px;
    color:var(--gray);
    margin-bottom:25px;
    text-align:center;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.full{
    grid-column:1 / -1;
}

/* INPUTS */
.input-group{
    margin-bottom:14px;
}

.input-group label{
    font-size:12px;
    color:var(--gray);
    display:block;
    margin-bottom:6px;
}

.input{
    width:100%;
    padding:13px;
    border-radius:12px;
    border:1px solid var(--border);
    background:rgba(0,0,0,0.3);
    color:white;
    outline:none;
}

.input:focus{
    border-color:var(--blue);
}

/* BUTTON */
.btn{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:999px;
    background:var(--blue);
    color:white;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 30px rgba(59,130,246,0.4);
}

/* FOOTER */
.footer{
    margin-top:15px;
    font-size:12px;
    text-align:center;
    color:var(--gray);
}

.footer a{
    color:var(--blue);
    text-decoration:none;
}
</style>
</head>

<body>

<div class="bg">
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
</div>

<div class="container">

    <!-- LOGO FORA -->
    <div class="logo">
        <img src="/static/img/logo.png" alt="logo">
        <h1>Biblioteca Digital</h1>
    </div>

    <!-- CARD -->
    <div class="card">

        <div class="title">Criar Conta</div>
        <div class="subtitle">Cadastre-se para acessar o sistema</div>

        <form>
            <div class="grid">

                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" class="input">
                </div>

                <div class="input-group">
                    <label>Sobrenome</label>
                    <input type="text" class="input">
                </div>

                <div class="input-group full">
                    <label>Usuário</label>
                    <input type="text" class="input">
                </div>

                <div class="input-group full">
                    <label>Email</label>
                    <input type="email" class="input">
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" class="input">
                </div>

                <div class="input-group">
                    <label>Confirmar</label>
                    <input type="password" class="input">
                </div>

            </div>

            <button class="btn">Registrar</button>
        </form>

        <div class="footer">
            Já tem conta? <a href="index.html">Entrar</a>
        </div>

    </div>

</div>

</body>
</html>
